# Use mold as the linker on Linux to dramatically reduce link times and
# prevent OOM crashes caused by ld consuming excessive memory during linking
# of large Rust projects.
#
# Requirements: mold and clang must be installed.
#   Fedora: sudo dnf install mold
#   Ubuntu: sudo apt install mold
#   NixOS/nix devShell: mold is included in devShells.default
# Share one target dir across all git worktrees to avoid redundant
# copies of build artifacts (~20GB each).
[build]
target-dir = "/home/jsell/code/gyre/target"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
