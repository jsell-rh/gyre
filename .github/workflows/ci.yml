name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mold linker
        run: sudo apt-get install -y mold
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: v0-clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  arch-lint:                                                                                                                                  
    name: Architecture lint                                                                                                                     
    runs-on: ubuntu-latest                                                                                                                      
    steps:                                                                                                                                      
      - uses: actions/checkout@v4                                                                                                               
      - run: bash scripts/check-arch.sh                                                                                                         
      - name: API auth coverage lint                                                                                                            
        run: bash scripts/check-api-auth.sh                                                                                                     
      - name: Tenant filter lint                                                                                                                
        run: bash scripts/check-tenant-filter.sh                                                                                                
      - name: Em-dash check                                                                                                                     
        run: |                                                                                                                                  
          find crates -name '*.rs' -o -name '*.toml' | xargs bash scripts/check-no-em-dash.sh || true  

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mold linker
        run: sudo apt-get install -y mold
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: v0-test
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --all

  build-release:
    name: Build (release)
    if: github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mold linker
        run: sudo apt-get install -y mold
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: v0-release
      - run: cargo build --release --all
