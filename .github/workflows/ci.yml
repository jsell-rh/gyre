name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Architecture lint
        run: bash scripts/check-arch.sh

      - name: API auth coverage lint
        run: bash scripts/check-api-auth.sh
        continue-on-error: true   # Advisory until M34 Slice 4 fixes all violations

      - name: Tenant filter lint
        run: bash scripts/check-tenant-filter.sh
        continue-on-error: true   # Advisory until M34 Slice 4 fixes all violations

      - name: Em-dash check
        run: |
          find crates -name '*.rs' -o -name '*.toml' | xargs bash scripts/check-no-em-dash.sh || true

      - name: cargo test
        run: cargo test --all

      - name: cargo build (release)
        run: cargo build --release --all
