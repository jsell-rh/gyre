repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Check Rust formatting
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Lint Rust code (warnings are errors)
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: arch-lint
        name: architecture lint
        description: Enforce hexagonal architecture - gyre-domain must not import gyre-adapters
        entry: scripts/check-arch.sh
        language: script
        pass_filenames: false

      - id: no-em-dash
        name: no em-dash
        description: Reject Unicode em-dashes (U+2014) in source files
        entry: scripts/check-no-em-dash.sh
        language: script
        types_or: [rust, toml, yaml, markdown]
        pass_filenames: true

      - id: cli-spec-parity
        name: CLI spec parity
        description: Detect CLI-spec signature drift, silent param drops, wrong endpoints
        entry: scripts/check-cli-spec-parity.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: tenant-filter
        name: tenant filter lint
        description: Verify Diesel read queries filter by tenant_id
        entry: scripts/check-tenant-filter.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: type-simplification
        name: type simplification
        description: Detect String fields in gyre-common where named enum/struct types exist
        entry: scripts/check-type-simplification.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: api-auth
        name: API auth enforcement
        description: Verify ABAC middleware chain on api router and per-handler auth on non-ABAC routes
        entry: scripts/check-api-auth.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: path-scope-binding
        name: path scope binding
        description: Verify API handlers bind Path tenant_id/workspace_id to auth context
        entry: scripts/check-path-scope-binding.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: message-delivery
        name: message delivery parity
        description: Verify dispatch_tx sends are paired with broadcast_tx sends
        entry: scripts/check-message-delivery.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: response-consumption
        name: response consumption lint
        description: Detect CLI display functions that silently drop fields from server response structs
        entry: scripts/check-response-consumption.sh
        language: script
        pass_filenames: false

      - id: crypto-verify
        name: crypto verify lint
        description: Verify handlers that decode crypto input also perform cryptographic verification
        entry: scripts/check-crypto-verify.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: hardcoded-defaults
        name: hardcoded defaults lint
        description: Detect hardcoded string defaults where runtime values should be used
        entry: scripts/check-hardcoded-defaults.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: event-payload
        name: event payload lint
        description: Verify event payloads include all spec-required fields
        entry: scripts/check-event-payload.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: notification-priority
        name: notification priority lint
        description: Verify notification priorities match spec-defined values
        entry: scripts/check-notification-priority.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: conventional-commits
        name: conventional commits
        description: Enforce conventional commit message format
        entry: scripts/check-commit-msg.sh
        language: script
        stages: [commit-msg]
